{% extends 'base.html' %}
{% block title %}New Booking{% endblock %}
{% block content %}
<h2 class="mb-4">New Booking Request</h2>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<div class="card shadow-sm"><div class="card-body p-4">
<form method="post" action="/bookings/new">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Guests Count</label>
            <input type="number" name="guests_count" class="form-control" min="1" max="10" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Apartment Class</label>
            <select name="apartment_class" class="form-select" required>
                {% for cls in apartment_classes %}
                <option value="{{ cls }}">{{ cls | capitalize }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label">Check-in Date</label>
            <input type="date" name="check_in" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Check-out Date</label>
            <input type="date" name="check_out" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label">Notes (optional)</label>
            <textarea name="notes" class="form-control" rows="2" placeholder="Any special requests..."></textarea>
        </div>
    </div>
    <div class="mt-4">
        <button type="submit" class="btn btn-primary">Submit Request</button>
        <a href="/bookings" class="btn btn-secondary ms-2">Cancel</a>
    </div>
</form>
</div></div>
{% endblock %}
